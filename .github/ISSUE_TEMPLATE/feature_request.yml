name: Feature request
description: Propose a focused improvement or new use case.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you unable to measure or do today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the behavior you need, without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: How are you handling this problem now?
  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      description: Would you be interested in helping implement this after the approach is agreed?
      options:
        - "Yes"
        - "Maybe"
        - "No"
    validations:
      required: true
